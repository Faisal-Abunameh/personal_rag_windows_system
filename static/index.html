<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Local RAG System — Chat with your documents using any Ollama model and FAISS">
    <title>Local LLM — RAG Chat</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
    <!-- Highlight.js for code highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- ─── Sidebar ─── -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="btn-new-chat" class="btn-new-chat" title="New Chat (Ctrl+N)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    <span>New Chat</span>
                </button>
                <button id="btn-toggle-sidebar" class="btn-icon sidebar-toggle" title="Close sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/>
                    </svg>
                </button>
            </div>

            <div class="sidebar-search">
                <input type="text" id="search-conversations" placeholder="Search chats..." autocomplete="off">
            </div>

            <nav id="conversation-list" class="conversation-list">
                <!-- Populated by JS -->
            </nav>

            <div class="sidebar-footer">
                <!-- Model Selector -->
                <div class="model-selector">
                    <label for="model-select" class="model-selector-label">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                        LLM Model
                    </label>
                    <select id="model-select" class="model-select" title="Choose LLM model">
                        <option value="">Loading models...</option>
                    </select>
                </div>

                <!-- Embedding Model Selector -->
                <div class="model-selector">
                    <label for="embed-model-select" class="model-selector-label">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 16v-4M12 8h.01"/>
                        </svg>
                        Embedding Model
                    </label>
                    <select id="embed-model-select" class="model-select" title="Choose embedding model">
                        <option value="">Loading models...</option>
                    </select>
                </div>



                <button id="btn-view-kb" class="btn-subtle" title="View Knowledge Base Chunks">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    <span>Knowledge Base</span>
                </button>

                <div id="system-status" class="system-status"></div>
            </div>
        </aside>

        <!-- ─── Sidebar collapsed toggle ─── -->
        <button id="btn-open-sidebar" class="btn-icon sidebar-open-btn hidden" title="Open sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>

        <!-- ─── Main Chat Area ─── -->
        <main class="main-content">
            <!-- Chat View -->
            <div id="chat-view" class="view active">
                <div id="chat-container" class="chat-container">
                    <div id="messages" class="messages">
                        <!-- Welcome screen shown when no conversation is active -->
                        <div id="welcome-screen" class="welcome-screen">
                            <div class="welcome-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="1.5">
                                    <defs>
                                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" stop-color="#a78bfa"/>
                                            <stop offset="100%" stop-color="#6366f1"/>
                                        </linearGradient>
                                    </defs>
                                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                                </svg>
                            </div>
                            <h1 class="welcome-title">Local LLM</h1>
                            <p id="welcome-subtitle" class="welcome-subtitle">Powered by Ollama &bull; FAISS &bull; NeMo Retriever</p>
                            <div class="welcome-hints">
                                <div class="hint-card" data-hint="Summarize the key findings from my documents">
                                    <span class="hint-icon">📄</span>
                                    <span>Summarize documents</span>
                                </div>
                                <div class="hint-card" data-hint="What are the main topics covered in my references?">
                                    <span class="hint-icon">🔍</span>
                                    <span>Search knowledge base</span>
                                </div>
                                <div class="hint-card" data-hint="Compare and contrast the information in my uploaded files">
                                    <span class="hint-icon">📊</span>
                                    <span>Analyze & compare</span>
                                </div>
                                <div class="hint-card" data-hint="Help me draft a report based on my documents">
                                    <span class="hint-icon">✍️</span>
                                    <span>Draft from references</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <!-- Attachment preview -->
                    <div id="attachment-preview" class="attachment-preview hidden"></div>

                    <div class="input-wrapper">
                        <button id="btn-attach" class="btn-icon btn-attach" title="Attach file">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>

                        <button id="btn-web-search" class="btn-icon btn-web-search" title="Enable Web Search">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="2" y1="12" x2="22" y2="12"/>
                                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                            </svg>
                        </button>

                        <textarea
                            id="message-input"
                            class="message-input"
                            placeholder="Message Local LLM..."
                            rows="1"
                            autofocus
                        ></textarea>

                        <button id="btn-send" class="btn-send" title="Send (Enter)" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>

                        <button id="btn-stop" class="btn-stop hidden" title="Stop generating">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="6" y="6" width="12" height="12" rx="2"/>
                            </svg>
                        </button>
                    </div>

                    <input type="file" id="file-input" class="hidden" multiple>

                    <p id="input-hint-text" class="input-hint">
                        Local LLM uses Ollama + FAISS RAG. Responses may not always be accurate.
                    </p>
                </div>
            </div>

            <!-- Knowledge Base View -->
            <div id="kb-view" class="view hidden">
                <div class="kb-header">
                    <div class="kb-title-area">
                        <h1>Knowledge Base</h1>
                        <p>Browse indexed documents and their segments.</p>
                    </div>
                    <div id="kb-stats" class="kb-stats">
                        <!-- Populated by JS -->
                    </div>
                </div>
                <div id="kb-content" class="kb-content">
                    <div class="kb-directory">
                        <div id="kb-document-list" class="kb-document-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="/static/js/markdown.js"></script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/kb.js"></script>
    <script src="/static/js/upload.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
